# Build and push to Docker Hub without a local Docker install (e.g. older Macs).
# GitHub → repo Settings → Secrets → add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN
# (token from hub.docker.com → Account Settings → Security → New Access Token)

name: Docker Hub publish

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            dukedotsol/siren-agent:latest
            dukedotsol/siren-agent:v0.1.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
